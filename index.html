<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script defer src="app.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
  <header class="topbar container">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <span class="brand-name">Client Portal</span>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="themeToggle" aria-label="Toggle theme">🌓</button>
      <button class="btn btn-danger" id="logoutBtn"><span class="btn-icon">🔒</span>Logout</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <form class="grid grid-2 gap-lg" id="filtersForm">
        <div class="form-field">
          <label for="state">State:</label>
          <div class="select">
            <select id="state" name="state">
              <option value="" selected disabled>Select State</option>
              <option value="NT">Northern Territory</option>
              <option value="NSW">New South Wales</option>
              <option value="QLD">Queensland</option>
              <option value="SA">South Australia</option>
              <option value="TAS">Tasmania</option>
              <option value="VIC">Victoria</option>
              <option value="WA">Western Australia</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label for="branch">Branch:</label>
          <div class="select">
            <select id="branch" name="branch">
              <option value="darwin" selected>Darwin</option>
              <option value="alice">Alice Springs</option>
              <option value="katherine">Katherine</option>
            </select>
          </div>
        </div>
      </form>
    </section>

    <section class="card">
      <div id="map" class="map" role="region" aria-label="Location map"></div>
    </section>
  </main>

  <footer class="container footer">
    <span>© <span id="year"></span> Company Name</span>
  </footer>
</body>
</html>
